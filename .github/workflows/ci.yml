name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ibuild_test
          POSTGRES_USER: ibuild
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ibuild:test@localhost:5432/ibuild_test
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema server/db/prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Frontend unit tests
        run: npm test

      - name: Server tests
        run: npm run test:server

      - name: Build
        run: npm run build
